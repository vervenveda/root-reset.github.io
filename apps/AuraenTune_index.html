<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Frequency Tuner</title>
<style>
  body {
    font-family: "Poppins", system-ui, -apple-system, "Segoe UI", sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #c8e6c9, #b3e5fc);
    color: #333;
    padding: 2rem;
    margin: 0;
  }
  h2 { 
    color: #2e7d32; 
    margin-top: 0;
  }
  .section button {
    background: linear-gradient(135deg, #81d4fa, #a5d6a7);
    border: none;
    border-radius: 10px;
    padding: 0.6rem 1.2rem;
    margin: 0.4rem;
    cursor: pointer;
    font-size: 1rem;
    transition: transform 0.2s, background 0.3s, box-shadow 0.3s;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  }
  .section button:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #4fc3f7, #81c784);
    box-shadow: 0 5px 14px rgba(0,0,0,0.2);
  }
  #freqVal {
    font-weight: bold;
    color: #1976d2;
    margin-left: 0.4rem;
  }
  #visualizer {
    width: 80%;
    max-width: 600px;
    height: 120px;
    margin: 20px auto;
    background: rgba(255,255,255,0.4);
    border-radius: 12px;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
    overflow: hidden;
    position: relative;
  }
  .wave {
    position: absolute;
    width: 200%;
    height: 100%;
    top: 0;
    left: -50%;
    background: repeating-linear-gradient(
      90deg,
      rgba(33,150,243,0.4) 0px,
      rgba(33,150,243,0.4) 2px,
      transparent 2px,
      transparent 8px
    );
    animation: moveWave 1.2s linear infinite;
    opacity: 0.6;
  }
  @keyframes moveWave {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  #desc {
    margin-top: 1rem;
    font-style: italic;
    color: #4e342e;
    min-height: 1.4em;
  }
  .manual-row {
    margin-top: 20px;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  input[type="range"] {
    width: 200px;
  }
</style>
</head>
<body>

<!-- 🎵 Frequency Tuner -->
<div class="section" id="freq">
  <h2>Frequency Tuner</h2>
  <div>
    <button onclick="playFreq(432,'Healing 432 Hz restores calm and cellular balance.')">432 Hz Healing</button>
    <button onclick="playFreq(528,'528 Hz resonates with love and transformation.')">528 Hz Love</button>
    <button onclick="playFreq(639,'639 Hz encourages harmony and connection.')">639 Hz Harmony</button>
  </div>

  <div class="manual-row">
    <label for="freqRange">Manual Frequency (Hz):</label>
    <input type="range" id="freqRange" min="20" max="1000" value="440" oninput="updateFreq(this.value)">
    <span id="freqVal">440</span>
    <button onclick="playCustom()">Play</button>
    <button onclick="stopTone()">Stop</button>
  </div>

  <div id="visualizer">
    <div class="wave" id="wave"></div>
  </div>
  <div id="desc"></div>
</div>

<script>
  let audioCtx = null;
  let oscillator = null;
  let gainNode = null;
  let isPlaying = false;

  const freqDisplay = document.getElementById("freqVal");
  const desc = document.getElementById("desc");
  const wave = document.getElementById("wave");
  const range = document.getElementById("freqRange");

  function ensureAudioContext() {
    // Create or reuse a single AudioContext
    if (!audioCtx || audioCtx.state === "closed") {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") {
      // Resume on user gesture
      audioCtx.resume();
    }
  }

  function adjustWave(freq) {
    // Map freq 20–1000 Hz to a nice 0.25–1.5s animation duration
    const f = Math.max(20, Math.min(freq, 1000));
    const minDur = 0.25;
    const maxDur = 1.5;
    const ratio = (f - 20) / (1000 - 20); // 0 to 1
    const dur = maxDur - ratio * (maxDur - minDur);
    wave.style.animationDuration = dur.toFixed(2) + "s";
    wave.style.opacity = "0.9";
  }

  function resetWave() {
    wave.style.animationDuration = "1.2s";
    wave.style.opacity = "0.6";
  }

  function playFreq(freq, message) {
    stopTone();
    startTone(freq);
    desc.textContent = message;
    range.value = freq;
    freqDisplay.textContent = freq;
  }

  function playCustom() {
    stopTone();
    const freq = parseFloat(range.value);
    if (isNaN(freq)) return;
    startTone(freq);
    desc.textContent = `${freq} Hz pure tone is now playing.`;
  }

  function updateFreq(val) {
    const num = parseFloat(val);
    if (isNaN(num)) return;
    freqDisplay.textContent = num;
    if (isPlaying && oscillator) {
      oscillator.frequency.value = num;
      desc.textContent = `${num} Hz pure tone is now playing.`;
      adjustWave(num);
    }
  }

  function startTone(freq) {
    ensureAudioContext();

    // Stop any previous oscillator
    if (oscillator) {
      try {
        oscillator.stop();
      } catch (e) {}
      oscillator.disconnect();
      oscillator = null;
    }

    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.value = freq;
    gainNode.gain.value = 0.12; // gentle volume

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();

    isPlaying = true;
    adjustWave(freq);
  }

  function stopTone() {
    if (oscillator) {
      try {
        oscillator.stop();
      } catch (e) {}
      oscillator.disconnect();
      oscillator = null;
    }
    gainNode = null;
    isPlaying = false;
    desc.textContent = "";
    resetWave();
  }
</script>

</body>
</html>
