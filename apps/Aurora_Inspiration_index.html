let current = 0, answers = [];
let awaitingReflection = false;

function loadQuestion() {
  document.getElementById('auroraAffirm').textContent = "";
  document.getElementById('questionText').textContent = questions[current];
  const inputArea = document.getElementById('inputArea');
  inputArea.innerHTML = '';
  if (questions[current].toLowerCase().includes("color")) {
    inputArea.innerHTML = `<input type="color" id="userInput" style="width:88px;height:88px;padding:0;border:none;">`;
  } else if (questions[current].toLowerCase().includes("way to express")) {
    inputArea.innerHTML = `
      <select id="userInput" style="font-size:1.15em;">
        <option>Art</option>
        <option>Music</option>
        <option>Writing</option>
        <option>Dance</option>
        <option>Photography</option>
        <option>Other</option>
      </select>`;
  } else if (questions[current].length > 65) {
    inputArea.innerHTML = `<textarea id="userInput" rows="4" maxlength="220" style="resize:vertical"></textarea>`;
  } else {
    inputArea.innerHTML = `<input id="userInput" maxlength="120" autocomplete="off">`;
  }
  document.getElementById('userInput').focus();
  document.getElementById('nextBtn').textContent = "Show Aurora’s Reflection";
  document.getElementById('nextBtn').disabled = false;
  awaitingReflection = true;
}

function showAffirmation(answer) {
  let match = null;
  if (typeof answer === "string") {
    const val = answer.toLowerCase();
    for (let dict of auroraDictionary) {
      for (let k of dict.keywords) {
        if (val.includes(k)) {
          match = dict.responses[Math.floor(Math.random() * dict.responses.length)];
          break;
        }
      }
      if (match) break;
    }
  }
  if (!match) {
    match = affirmations[Math.floor(Math.random() * affirmations.length)];
  }
  document.getElementById('auroraAffirm').textContent = match;
}

function nextStep() {
  const input = document.getElementById('userInput');
  // First click: Show reflection based on answer
  if (awaitingReflection) {
    let val = input && input.type === "color" ? input.value : (input ? input.value : "");
    answers.push(val);
    showAffirmation(val);
    awaitingReflection = false;
    // Set creative button label for the next step
    if (current < questions.length - 1) {
      document.getElementById('nextBtn').textContent = "Next Reflection";
    } else {
      document.getElementById('nextBtn').textContent = "Get My Creative Prompt!";
    }
    return;
  }
  // Second click: Advance to next question or results
  document.getElementById('auroraAffirm').textContent = "";
  current++;
  if (current < questions.length) {
    loadQuestion();
  } else {
    showResultModal();
  }
}
