<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Affirmation Garden</title>

<style>
:root{
  --bg-a:#f9f7f4;
  --bg-b:#efeae4;
  --card:#ffffffcc;
  --ink:#2f2a25;
  --muted:#7a6f65;
  --accent:#9b8be5;
  --accent-soft:#e6e1ff;
  --radius:22px;
  --shadow:0 10px 30px rgba(0,0,0,0.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Montserrat,sans-serif;
  background:linear-gradient(180deg,var(--bg-a),var(--bg-b));
  color:var(--ink);
}

.affirmation-wrap{
  max-width:720px;
  margin:24px auto;
  padding:16px;
}

.affirmation-card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:26px 22px 22px;
  text-align:center;
}

.affirmation-title{
  font-size:13px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
}

.affirmation-text{
  font-size:22px;
  line-height:1.45;
  font-weight:500;
  margin:18px 0 16px;
}

.affirmation-reflection{
  font-size:14px;
  color:var(--muted);
  margin-top:6px;
}

.affirmation-actions{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:18px;
  flex-wrap:wrap;
}

.affirmation-actions button{
  background:linear-gradient(120deg,var(--accent),var(--accent-soft));
  border:none;
  border-radius:14px;
  padding:10px 16px;
  font-size:14px;
  font-weight:600;
  color:white;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s;
  box-shadow:0 6px 16px rgba(0,0,0,0.12);
}

.affirmation-actions button.secondary{
  background:transparent;
  color:var(--ink);
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:none;
}

.affirmation-actions button:active{
  transform:scale(0.96);
}

.saved-note{
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
}

@media(max-width:480px){
  .affirmation-text{font-size:20px}
}
</style>
</head>

<body>

<div class="affirmation-wrap">
  <div class="affirmation-card">
    <div class="affirmation-title">Affirmation Garden</div>

    <div id="affirmationText" class="affirmation-text"></div>
    <div id="affirmationReflection" class="affirmation-reflection"></div>

    <div class="affirmation-actions">
      <button id="newAffirmation">New Affirmation</button>
      <button id="saveAffirmation" class="secondary">Save This One</button>
    </div>

    <div id="savedNote" class="saved-note"></div>
  </div>
</div>

<script>

  "I build with care, not fear.",
  "My children benefit from my self-trust.",

  "I can hold responsibility without losing softness.",

  "My home and my work can coexist.",

  "I am learning how to steward my energy.",

  "My motherhood informs my leadership.",

  "I am not behind.",

  "I trust myself to adapt.",
  "I am creating a legacy of integrity.",
  "I am becoming who I need to be.",
"You are allowed to move at your own pace.",
  "You are becoming more yourself every day.",
  "Nothing about you needs to be fixed.",
  "You are safe to soften here.",
  "Your presence is enough.",
  "You are learning how to trust your own timing.",
  "You carry more wisdom than you realize.",
  "You do not need permission to rest.",
  "You are worthy of gentleness.",

const reflections = [
  "Let this land softly.",
  "You don’t need to do anything else right now.",

  "Carry this with you gently.",

  "Stay here for a moment if you’d like.",

  "There is no rush to become.",

  "This belongs to you.",

];

const affirmationText = document.getElementById("affirmationText");
const affirmationReflection = document.getElementById("affirmationReflection");
const savedNote = document.getElementById("savedNote");

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function showAffirmation(){
  affirmationText.textContent = randomItem(affirmations);
  affirmationReflection.textContent = randomItem(reflections);
  savedNote.textContent = "";
}

document.getElementById("newAffirmation").onclick = showAffirmation;

document.getElementById("saveAffirmation").onclick = () => {
  const saved = JSON.parse(localStorage.getItem("saved_affirmations") || "[]");
  saved.push({
    text: affirmationText.textContent,
    time: new Date().toISOString()
  });
  localStorage.setItem("saved_affirmations", JSON.stringify(saved));
  savedNote.textContent = "Saved locally 🌿";
};

showAffirmation();
</script>

</body>
</html>
