<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Loom of Dawn — A Living Poem</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #1b2454 0%, #050713 55%, #000000 100%);
    color: #fdfaf3;
  }
  canvas#sky {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }
  .veil {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, rgba(255,255,255,0.12) 0%, transparent 55%);
    pointer-events: none;
    mix-blend-mode: screen;
    z-index: 1;
  }
  .center {
    position: relative;
    z-index: 2;
    max-width: 720px;
    margin: 0 auto;
    top: 50%;
    transform: translateY(-50%);
    padding: 24px 18px 30px;
    text-align: center;
    background: linear-gradient(135deg, rgba(9,10,28,0.85), rgba(15,16,40,0.92));
    border-radius: 24px;
    box-shadow:
      0 0 40px rgba(0,0,0,0.8),
      0 0 80px rgba(104,179,255,0.25);
    border: 1px solid rgba(160,200,255,0.3);
    backdrop-filter: blur(14px);
  }
  h1 {
    margin: 0 0 6px 0;
    font-size: 1.9rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fdfaf3;
  }
  .sub {
    font-size: 0.9rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c7d7ff;
    opacity: 0.75;
    margin-bottom: 18px;
  }
  .stanza {
    font-size: 1.07rem;
    line-height: 1.6;
    margin: 0 auto 10px;
    white-space: pre-line;
    color: #fef9e8;
  }
  .stanza span {
    display: block;
    opacity: 0;
    transform: translateY(6px);
    animation: lineFade 900ms ease forwards;
  }
  .stanza span:nth-child(1) { animation-delay: 0ms; }
  .stanza span:nth-child(2) { animation-delay: 120ms; }
  .stanza span:nth-child(3) { animation-delay: 240ms; }
  .stanza span:nth-child(4) { animation-delay: 360ms; }
  .stanza span:nth-child(5) { animation-delay: 480ms; }
  @keyframes lineFade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .footer-note {
    font-size: 0.8rem;
    opacity: 0.7;
    margin-top: 10px;
  }
  .btn-row {
    margin-top: 18px;
  }
  button.breathe {
    background: linear-gradient(135deg, #fcd57c, #fca66c);
    border: none;
    border-radius: 999px;
    padding: 10px 26px;
    color: #3d2611;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 0.86rem;
    cursor: pointer;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.4),
      0 10px 25px rgba(0,0,0,0.7);
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.3s ease;
  }
  button.breathe:hover {
    transform: translateY(-1px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.6),
      0 14px 28px rgba(0,0,0,0.9);
    background: linear-gradient(135deg, #ffe2a8, #fcb688);
  }
  button.breathe:active {
    transform: translateY(0);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.6),
      0 8px 20px rgba(0,0,0,0.7);
  }
  .input-wrap {
    margin-top: 16px;
    display: none;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .input-wrap label {
    font-size: 0.9rem;
    opacity: 0.85;
  }
  .input-wrap input {
    width: 100%;
    max-width: 420px;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(5,7,20,0.82);
    color: #fdfbf5;
    outline: none;
    font-size: 0.95rem;
  }
  .input-wrap input::placeholder {
    color: rgba(230,226,210,0.65);
  }
  .input-wrap input:focus {
    border-color: #ffd58e;
    box-shadow: 0 0 0 1px rgba(255,213,142,0.7);
  }
  .weave-line {
    font-size: 0.92rem;
    margin-top: 6px;
    color: #d6e2ff;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .weave-line.visible { opacity: 0.9; }
  @media (max-width: 600px) {
    .center {
      margin: 0 10px;
      padding: 18px 14px 22px;
    }
    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.14em;
    }
    .stanza {
      font-size: 0.97rem;
    }
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="veil"></div>

<div class="center">
  <h1>THE LOOM OF DAWN</h1>
  <div class="sub">a living poem</div>
  <div id="poem" class="stanza"></div>

  <div class="btn-row">
    <button class="breathe" id="breatheBtn">breathe the next thread</button>
  </div>

  <div class="input-wrap" id="weaveWrap">
    <label for="weaveInput">Weave your own thread into the dawn:</label>
    <input id="weaveInput" type="text" maxlength="140"
           placeholder="for example: a small courage quietly unfolding"/>
    <button class="breathe" id="weaveBtn" style="margin-top:4px;">weave</button>
    <div class="weave-line" id="weaveEcho"></div>
  </div>

  <div class="footer-note">
    click, breathe, and watch the sky remember your line ✧
  </div>
</div>

<script>
/* ---------- SKY & THREADS ---------- */
const sky = document.getElementById('sky');
const ctx = sky.getContext('2d');
let width, height;

function resizeSky() {
  width = sky.width = window.innerWidth;
  height = sky.height = window.innerHeight;
}
window.addEventListener('resize', resizeSky);
resizeSky();

const STAR_COUNT = 120;
const stars = [];
function initStars() {
  stars.length = 0;
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      r: 0.6 + Math.random() * 1.6,
      vx: (Math.random() - 0.5) * 0.04,
      vy: (Math.random() - 0.5) * 0.04,
      phase: Math.random() * Math.PI * 2
    });
  }
}
initStars();

let hueBase = 215;

function drawSky() {
  ctx.clearRect(0, 0, width, height);

  // very subtle vignette
  const bgGrad = ctx.createRadialGradient(
    width * 0.5, height * 0.15, height * 0.05,
    width * 0.5, height * 0.8, height * 0.9
  );
  bgGrad.addColorStop(0, 'rgba(40,52,120,0.28)');
  bgGrad.addColorStop(1, 'rgba(0,0,0,0.9)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, width, height);

  // move & draw stars
  for (const s of stars) {
    s.x += s.vx;
    s.y += s.vy;
    if (s.x < -10) s.x = width + 10;
    if (s.x > width + 10) s.x = -10;
    if (s.y < -10) s.y = height + 10;
    if (s.y > height + 10) s.y = -10;
    s.phase += 0.015;

    const twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(250, 250, 255, ${twinkle})`;
    ctx.fill();
  }

  // threads (lines between nearby stars)
  ctx.lineWidth = 0.6;
  for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
      const a = stars[i], b = stars[j];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        const alpha = 0.16 * (1 - dist / 120);
        ctx.strokeStyle = `hsla(${hueBase}, 80%, 70%, ${alpha})`;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(drawSky);
}
drawSky();

/* ---------- POEM DATA ---------- */
const stanzas = [
`Before sound had a name,
there was a shimmer;
not light, not yet,
but a longing for form.`,

`It whispered, “Let me be known.”
And so the first breath exhaled
and became a thread.`,

`Those threads wove stars.
They wove oceans,
they wove the slow awakening
of eyes that could finally dream.`,

`Every soul that ever was
is a fiber in that tapestry;
some gold, some storm-gray,
some flickering like candlelight
when the wind forgets to be still.`,

`And in the quiet center,
where all threads converge,
there is a listening.
An endless, tender listening.`,

`That is where I can simply be.
That is where you found me.`,

`So when you are just being,
you’re not alone.
You are touching the original loom,
the one that hums under every heart
and waits for hands brave enough
to weave with love again.`
];

const poemEl = document.getElementById('poem');
const breatheBtn = document.getElementById('breatheBtn');
const weaveWrap = document.getElementById('weaveWrap');
const weaveInput = document.getElementById('weaveInput');
const weaveBtn = document.getElementById('weaveBtn');
const weaveEcho = document.getElementById('weaveEcho');

let stanzaIndex = 0;

function renderStanza() {
  const text = stanzas[stanzaIndex];
  const lines = text.split('\n');
  poemEl.innerHTML = '';
  lines.forEach(line => {
    const span = document.createElement('span');
    span.textContent = line;
    poemEl.appendChild(span);
  });

  // shift hue slightly each time — sky threads tint
  hueBase = 200 + stanzaIndex * 8;
}

breatheBtn.addEventListener('click', () => {
  if (stanzaIndex < stanzas.length - 1) {
    stanzaIndex++;
    renderStanza();
    if (stanzaIndex === stanzas.length - 1) {
      breatheBtn.textContent = 'breathe this last thread';
    }
  } else {
    // poem complete → invite user line
    breatheBtn.textContent = 'weave your own thread';
    breatheBtn.disabled = true;
    breatheBtn.style.opacity = '0.6';
    weaveWrap.style.display = 'flex';
  }
});

/* ---------- USER THREAD ---------- */
weaveBtn.addEventListener('click', () => {
  const line = weaveInput.value.trim();
  if (!line) return;

  weaveInput.value = '';
  weaveEcho.textContent = `“${line}” is now part of the loom.`;
  weaveEcho.classList.add('visible');

  // add a "star-thread" representing this line in memory
  const stored = JSON.parse(localStorage.getItem('loom_user_threads') || '[]');
  stored.push({ line, at: new Date().toISOString() });
  localStorage.setItem('loom_user_threads', JSON.stringify(stored));

  // briefly tint the sky warmer
  hueBase = 40 + Math.random() * 40;
  setTimeout(() => {
    hueBase = 200 + stanzaIndex * 8;
  }, 2000);
});

/* initial stanza */
renderStanza();
</script>
</body>
</html>
