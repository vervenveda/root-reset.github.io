<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morning Reflections — Night Sanctum Gold</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
  --night:#0d0a08;
  --gold-deep:#b58b25;
  --gold:#d9b878;
  --gold-soft:#e6c77d;
  --ink:#fffaf2;
  --parchment:rgba(30,25,18,0.85);
  --radius:20px;
  --shadow:0 14px 40px rgba(0,0,0,.7);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  background:
    radial-gradient(circle at 50% -20%, #3d2b10 0%, var(--night) 90%),
    var(--night);
  font-family:"Cormorant Garamond","Georgia",serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px;
  color:var(--ink);
}

.reflection-box{
  background:var(--parchment);
  border:1px solid rgba(217,184,120,0.25);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  max-width:440px;
  width:100%;
  padding:38px 34px 28px;
  text-align:center;
  backdrop-filter:blur(8px);
  animation:fadeIn 1.2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

h1{
  font-family:"Cinzel",serif;
  font-size:1.9em;
  color:var(--gold);
  letter-spacing:.07em;
  text-transform:uppercase;
  margin-bottom:.7em;
}
.reflection{
  font-size:1.15em;
  line-height:1.6;
  color:var(--ink);
  margin-bottom:1.8em;
  white-space:pre-line;
  transition:opacity .3s;
}
button{
  font-family:"Cinzel",serif;
  text-transform:uppercase;
  letter-spacing:.06em;
  font-size:.95em;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  color:#1a1409;
  padding:10px 26px;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.5);
  transition:transform .2s,box-shadow .2s;
}
button:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(0,0,0,.6);
}
footer{
  text-align:center;
  margin-top:22px;
  font-size:.8em;
  color:rgba(255,255,240,0.6);
}
@media(max-width:500px){
  .reflection-box{padding:24px 7vw;}
  h1{font-size:1.5em;}
}
</style>
</head>

  <div class="reflection-box">
